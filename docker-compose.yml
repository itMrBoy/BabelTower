services:
  # PostgreSQL 数据库
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: babeltower
      POSTGRES_PASSWORD: babeltower
      POSTGRES_DB: babeltower
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babeltower"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://babeltower:babeltower@db:5432/babeltower?schema=public"
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

  # 开发模式（可选，profile=dev）：使用 docker compose --profile dev up -d app-dev
  # （必须点名 app-dev，否则会与下面无 profile 的 app 抢占 3000 端口）
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://babeltower:babeltower@db:5432/babeltower?schema=public"
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dev

volumes:
  pgdata:
